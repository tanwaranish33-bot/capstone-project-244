<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Weather</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-scene">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <!-- Main App -->
  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">⛅</span>
        <span class="logo-text">Aether</span>
      </div>
      <div class="unit-toggle">
        <button id="btn-celsius" class="unit-btn active">°C</button>
        <span class="toggle-divider">/</span>
        <button id="btn-fahrenheit" class="unit-btn">°F</button>
      </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
      <div class="search-tagline">What's the sky saying today?</div>
      <div class="search-bar">
        <i class="fa fa-search search-icon"></i>
        <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off" />
        <button id="search-btn">Search</button>
      </div>
      <div class="quick-cities">
        <span class="quick-label">Quick:</span>
        <button class="quick-btn" data-city="London">London</button>
        <button class="quick-btn" data-city="Tokyo">Tokyo</button>
        <button class="quick-btn" data-city="New York">New York</button>
        <button class="quick-btn" data-city="Dubai">Dubai</button>
      </div>
    </section>

    <!-- Error Message -->
    <div class="error-message" id="error-msg">
      <i class="fa fa-triangle-exclamation"></i>
      <span id="error-text">City not found. Please try again.</span>
    </div>

    <!-- Loading Spinner -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Fetching weather data...</p>
    </div>

    <!-- Weather Dashboard -->
    <div class="dashboard" id="dashboard">

      <!-- Hero Card -->
      <div class="hero-card glass-card">
        <div class="hero-left">
          <div class="city-name" id="city-name">—</div>
          <div class="country-name" id="country-name">—</div>
          <div class="local-time" id="local-time">—</div>
          <div class="weather-desc" id="weather-desc">—</div>
          <div class="temp-display">
            <span class="temp-big" id="temp-main">—</span>
            <span class="temp-unit-label" id="unit-label">°C</span>
          </div>
          <div class="feels-like">Feels like <span id="feels-like">—</span></div>
        </div>
        <div class="hero-right">
          <div class="weather-icon-wrap">
            <img id="weather-icon" src="" alt="weather icon" />
            <div class="icon-glow"></div>
          </div>
        </div>
      </div>

      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat-card glass-card">
          <div class="stat-icon"><i class="fa fa-droplet"></i></div>
          <div class="stat-info">
            <div class="stat-value" id="humidity">—</div>
            <div class="stat-label">Humidity</div>
          </div>
        </div>
        <div class="stat-card glass-card">
          <div class="stat-icon"><i class="fa fa-wind"></i></div>
          <div class="stat-info">
            <div class="stat-value" id="wind-speed">—</div>
            <div class="stat-label">Wind Speed</div>
          </div>
        </div>
        <div class="stat-card glass-card">
          <div class="stat-icon"><i class="fa fa-eye"></i></div>
          <div class="stat-info">
            <div class="stat-value" id="visibility">—</div>
            <div class="stat-label">Visibility</div>
          </div>
        </div>
        <div class="stat-card glass-card">
          <div class="stat-icon"><i class="fa fa-gauge"></i></div>
          <div class="stat-info">
            <div class="stat-value" id="pressure">—</div>
            <div class="stat-label">Pressure</div>
          </div>
        </div>
      </div>

      <!-- Sun Row -->
      <div class="sun-row">
        <div class="sun-card glass-card">
          <div class="sun-icon sunrise-icon"><i class="fa fa-sun"></i></div>
          <div class="sun-info">
            <div class="sun-time" id="sunrise">—</div>
            <div class="sun-label">Sunrise</div>
          </div>
        </div>
        <div class="sun-divider">
          <div class="sun-arc">
            <svg viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
              <path d="M 10 70 Q 100 0 190 70" fill="none" stroke="rgba(255,200,80,0.4)" stroke-width="2" stroke-dasharray="5,4"/>
              <circle id="sun-dot" cx="100" cy="35" r="6" fill="#FFD166"/>
            </svg>
          </div>
        </div>
        <div class="sun-card glass-card">
          <div class="sun-icon sunset-icon"><i class="fa fa-moon"></i></div>
          <div class="sun-info">
            <div class="sun-time" id="sunset">—</div>
            <div class="sun-label">Sunset</div>
          </div>
        </div>
      </div>

      <!-- 5-Day Forecast -->
      <div class="forecast-section glass-card">
        <div class="section-title"><i class="fa fa-calendar-days"></i> 5-Day Forecast</div>
        <div class="forecast-list" id="forecast-list">
          <!-- filled by JS -->
        </div>
      </div>

    </div><!-- /dashboard -->

    <footer class="app-footer">
      Powered by <a href="https://openweathermap.org" target="_blank">OpenWeatherMap API</a> &nbsp;·&nbsp; Aether Weather © 2025
    </footer>

  </div><!-- /app-wrapper -->

  <script src="js/app.js"></script>
</body>
</html>
